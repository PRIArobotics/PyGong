version: 2
updates:
  # Python dependencies (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(pip):"
      include: "scope"
    reviewers:
      - "PRIArobotics"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(actions):"
      include: "scope"
    reviewers:
      - "PRIArobotics"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
